<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PCA Kurtosis Explorer</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0A0A0A; color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #app-container { display: flex; gap: 50px; align-items: center; justify-content: center; }
        #canvas-wrapper { width: 600px; height: 600px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,1); overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        #canvas-container { position: relative; width: 600px; height: 600px; background-color: #111; background-size: cover; display: flex; align-items: center; justify-content: center; cursor: crosshair; transform-origin: center; transition: transform 0.1s ease-out; }
        #image-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #dream-image { width: 400px; height: 400px; image-rendering: pixelated; border-radius: 20px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); background: #111; }
        .node { position: absolute; width: 12px; height: 12px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; transform: translate(-50%, -50%); transition: background 0.2s, transform 0.2s; box-shadow: 0 0 5px rgba(0,0,0,0.5); cursor: pointer; z-index: 8; }
        .node.active { background: #00ffcc; box-shadow: 0 0 15px #00ffcc; transform: translate(-50%, -50%) scale(1.5); }
        #cursor { position: absolute; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 5; transition: border-color 0.2s; }
        #controls { margin-top: 30px; display: flex; gap: 20px; }
        button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        button:hover { background: rgba(255,255,255,0.2); border-color: white; }
        h1 { margin: 0 0 10px 0; font-weight: 300; letter-spacing: 2px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; max-width: 600px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>
    <h1>PCA KURTOSIS MAP</h1>
    <p>The background displays mathematical Kurtosis topology along the top 2 PCA dimensions. High-kurtosis ICA components are mapped as landmarks. Hover the topography to synthesize geometry on the PCA plane, or click a node to lock directly onto its 256D component.</p>
    
    <div id="app-container">
        <div id="canvas-wrapper">
            <div id="canvas-container">
                <div id="cursor" style="left: 300px; top: 300px;"></div>
            </div>
        </div>
        
        <div id="image-container">
            <img id="dream-image" src="" alt="" />
            <div id="controls">
                <button id="btn-reset">Reset Noise</button>
                <button id="btn-pause">Pause Optimization</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const img = document.getElementById('dream-image');
        const cursor = document.getElementById('cursor');
        
        let nodes = [];
        let currentMouse = { x: 300, y: 300 };
        let isOptimizing = true;
        let selectedNodeIdx = -1;
        let zoomLevel = 1.0;
        
        const wrapper = document.getElementById('canvas-wrapper');
        wrapper.addEventListener('wheel', (e) => {
            e.preventDefault();
            if(e.deltaY < 0) {
                zoomLevel *= 1.2;
            } else {
                zoomLevel /= 1.2;
            }
            zoomLevel = Math.max(1.0, Math.min(zoomLevel, 6.0));
            container.style.transform = `scale(${zoomLevel})`;
        });

        wrapper.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            currentMouse.x = (e.clientX - rect.left) / zoomLevel;
            currentMouse.y = (e.clientY - rect.top) / zoomLevel;
            cursor.style.left = currentMouse.x + 'px';
            cursor.style.top = currentMouse.y + 'px';
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            fetch('http://localhost:5001/reset', { method: 'POST' });
        });

        const pauseBtn = document.getElementById('btn-pause');
        pauseBtn.addEventListener('click', () => {
            isOptimizing = !isOptimizing;
            pauseBtn.textContent = isOptimizing ? 'Pause Optimization' : 'Resume Optimization';
        });

        // Initialize Layout
        async function fetchLayout() {
            const res = await fetch('http://localhost:5001/layout');
            const data = await res.json();
            
            // Set Background Heatmap
            container.style.backgroundImage = `url(${data.background})`;
            
            // Plot Nodes
            data.nodes.forEach(n => {
                // n.x and n.y are in [-1, 1], map to [0, 600]
                const px = (n.x + 1) * 300;
                const py = (-n.y + 1) * 300; // invert y for standard cartesian
                
                const nodeEl = document.createElement('div');
                nodeEl.className = 'node';
                nodeEl.style.left = px + 'px';
                nodeEl.style.top = py + 'px';
                
                nodeEl.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    if (selectedNodeIdx === n.idx) {
                        selectedNodeIdx = -1;
                        nodeEl.classList.remove('active');
                    } else {
                        selectedNodeIdx = n.idx;
                        nodes.forEach(no => no.el.classList.remove('active'));
                        nodeEl.classList.add('active');
                    }
                });
                
                container.appendChild(nodeEl);
                nodes.push({ idx: n.idx, x: px, y: py, el: nodeEl });
            });
            
            step();
        }

        async function step() {
            if(!isOptimizing) {
                setTimeout(step, 100);
                return;
            }
            
            let payload = {};
            if (selectedNodeIdx !== -1) {
                payload = { mode: "ica", idx: selectedNodeIdx };
            } else {
                // map 0-600 to -1 to 1 space
                let mx = (currentMouse.x / 300) - 1.0;
                let my = -((currentMouse.y / 300) - 1.0);
                payload = { mode: "pca", x: mx, y: my };
            }
            
            try {
                const res = await fetch('http://localhost:5001/step', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                img.src = data.image;
            } catch(e) {
                console.error("API error", e);
            }
            
            requestAnimationFrame(step);
        }

        fetch('http://localhost:5001/reset', { method: 'POST' }).then(() => fetchLayout());
        
    </script>
</body>
</html>
